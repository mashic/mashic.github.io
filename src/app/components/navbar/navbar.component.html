<nav class="navbar" [class.menu-open]="menuOpen">
  <div class="nav-container">
    <a class="nav-logo" (click)="scrollTo('hero')">R.M.</a>

    <button class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Toggle navigation">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <ul class="nav-links" [class.open]="menuOpen">
      @for (link of navLinks; track link.target; let i = $index) {
        <li>
          <a (click)="scrollTo(link.target)">
            <span class="nav-number">0{{ i + 1 }}.</span> {{ link.label }}
          </a>
        </li>
      }
    </ul>
  </div>
</nav>
